services:
  # Backend FastAPI Service
  - type: web
    name: upward-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 8080

  # Frontend React Service (Static Site)
  - type: web
    name: upward-frontend
    env: static
    buildCommand: cd Frontend && npm install && npm run build
    staticPublishDir: Frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: upward-backend
          property: host
